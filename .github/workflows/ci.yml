# .github/workflows/ci.yml
# Continuous Integration for Finchippay-Solution
#
# Runs on every push to main/develop and on every pull-request targeting main.
# Five parallel jobs:
#   1. frontend  — lint, type-check, unit tests, Next.js build
#   2. backend   — lint, unit tests
#   3. contracts — cargo check, cargo test, WASM build
#   4. compose   — validate Docker Compose configurations
#   5. e2e       — Playwright end-to-end tests

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          ANTHROPIC_API_KEY: test-key-for-ci

  # ─── Contracts ─────────────────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts (Rust)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts/finchippay-contract

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/finchippay-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/finchippay-contract/Cargo.lock') }}

      - name: Check
        run: cargo check --target wasm32-unknown-unknown

      - name: Test
        run: cargo test

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

  # ─── Docker Compose Validation ──────────────────────────────────────────────
  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml (dev)
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.prod.yml (production)
        run: docker compose -f docker-compose.prod.yml config --quiet

  # ─── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          npm ci
          npm start &
          for i in $(seq 1 30); do
            curl -s http://localhost:4000/health && break
            [ "$i" -eq 30 ] && echo "Backend failed to start" && exit 1
            sleep 1
          done
        env:
          PORT: 4000
          NODE_ENV: test
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org
          JWT_SECRET: test-secret
          ANTHROPIC_API_KEY: test-key-for-ci

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
